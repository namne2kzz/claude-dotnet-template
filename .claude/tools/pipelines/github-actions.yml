name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'

jobs:
  backend:
    name: .NET Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: projects/backend

      - name: Build
        run: dotnet build --configuration Release --warnaserror
        working-directory: projects/backend

      - name: Test
        run: |
          dotnet test \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger trx
        working-directory: projects/backend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: projects/backend/TestResults

  frontend:
    name: Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: projects/frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: projects/frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: projects/frontend

      - name: Lint
        run: npx ng lint
        working-directory: projects/frontend

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless
        working-directory: projects/frontend

      - name: Build
        run: npx ng build --configuration production
        working-directory: projects/frontend

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Azure
        run: echo "Deploy to dev — configure AKS/App Service steps here"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # Requires manual approval in GitHub
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Azure
        run: echo "Deploy to prod — configure AKS/App Service steps here"
